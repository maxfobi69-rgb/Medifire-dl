name: دانلود از مدیافایر و ذخیره در مخزن (حجم بالا به‌صورت بایگانی چندبخشی)
on:
  workflow_dispatch:

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: دریافت سورس مخزن
        uses: actions/checkout@v4

      - name: نصب ابزارهای مورد نیاز (پایتون و 7-Zip)
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: |
          pip install requests beautifulsoup4
          sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: دانلود فایل از مدیافایر
        run: |
          python << 'PYEOF'
          import requests, re, os

          url = "https://www.mediafire.com/file/4vkyo977w7yxrjj/install_ps3tools_4.8.1.exe/file"
          headers = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}

          resp = requests.get(url, headers=headers)
          html = resp.text
          match = re.search(r'href="(https?://download\d+\.mediafire\.com/[^"]+)"', html)
          if not match:
              match = re.search(r'(https?://download\d+\.mediafire\.com/[^\s"\']+)', html)
          if not match:
              raise Exception("لینک مستقیم یافت نشد. فایل عمومی و لینک https را بررسی کنید.")
          
          download_link = match.group(1).replace("&amp;", "&")
          print(f"لینک مستقیم: {download_link}")

          os.makedirs("downloaded_temp", exist_ok=True)
          file_name = "Phyre_Engine.7z"
          file_path = os.path.join("downloaded_temp", file_name)

          print("در حال دانلود...")
          with requests.get(download_link, headers=headers, stream=True) as r:
              r.raise_for_status()
              with open(file_path, 'wb') as f:
                  for chunk in r.iter_content(chunk_size=8192):
                      f.write(chunk)
          print("دانلود کامل شد.")
          PYEOF

      - name: آماده‌سازی فایل‌ها و بایگانی چندبخشی در پوشه download
        run: |
          # پوشه download را از قبل خالی می‌کنیم
          rm -rf download
          mkdir -p download

          if [ -f downloaded_temp/Phyre_Engine.7z ]; then
            FILESIZE=$(stat -c%s downloaded_temp/Phyre_Engine.7z)
            echo "حجم فایل: $FILESIZE بایت"
            if [ $FILESIZE -gt 52428800 ]; then   # بزرگتر از ۵۰ مگابایت
              echo "حجم فایل بیش از 50MB است. ساخت بایگانی چندبخشی 7z..."
              # با پسوند .7z و حجم هر بخش ۵۰ مگابایت
              7z a -v50m -mx0 "download/Phyre_split.7z" "downloaded_temp/Phyre_Engine.7z"
              # خروجی پیشفرض: Phyre_split.7z.001, Phyre_split.7z.002, ...
              echo "بایگانی چندبخشی ساخته شد:"
              ls -lh download/
            else
              echo "حجم کمتر از 50MB است. کپی مستقیم فایل..."
              cp downloaded_temp/Phyre_Engine.7z download/Phyre_Engine.7z
            fi
          else
            echo "فایل دانلود شده پیدا نشد!" && exit 1
          fi

      - name: Commit و Push فایل‌ها به مخزن
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add download/
          if git diff --staged --quiet; then
            echo "هیچ فایل جدیدی برای کامیت وجود ندارد."
            exit 0
          fi
          git commit -m "بایگانی فایل مدیافایر در پوشه download [skip ci]"
          git push
