name: Download MediaFire File

on:
  workflow_dispatch: # اجازهٔ اجرای دستی

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Download from MediaFire
        run: |
          yt-dlp -o "downloaded_file.%(ext)s" "http://www.mediafire.com/file/h5m8k0iicb8d4zu/Phyre_Engine.7z"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-file
          path: downloaded_file.*
