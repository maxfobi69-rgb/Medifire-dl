name: دانلود سفارشی از مدیافایر
on:
  workflow_dispatch: # اجرای دستی از تب Actions

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: نصب پایتون و کتابخانه‌ها
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install requests beautifulsoup4

      - name: دانلود فایل و ذخیره در پوشه downloads
        run: |
          python << 'EOF'
          import requests, re, os

          # آدرس فایل (حتماً https باشد)
          url = "https://www.mediafire.com/file/h5m8k0iicb8d4zu/Phyre_Engine.7z"
          headers = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}

          # دریافت صفحه
          resp = requests.get(url, headers=headers)
          html = resp.text

          # استخراج لینک مستقیم با regex
          match = re.search(r'href="(https?://download\d+\.mediafire\.com/[^"]+)"', html)
          if not match:
              # روش دوم: جستجوی هر لینکی که با download...mediafire.com شروع شود
              match = re.search(r'(https?://download\d+\.mediafire\.com/[^\s"\']+)', html)

          if not match:
              raise Exception("لینک مستقیم پیدا نشد. لطفاً از https استفاده کنید و فایل را عمومی کنید.")

          download_link = match.group(1).replace("&amp;", "&")
          print(f"لینک مستقیم پیدا شد: {download_link}")

          # ایجاد پوشه downloads
          os.makedirs("downloads", exist_ok=True)

          # دریافت نام فایل از URL یا حدس
          file_name = download_link.split("/")[-1] or "Phyre_Engine.7z"
          file_path = os.path.join("downloads", file_name)

          # دانلود
          print("در حال دانلود...")
          with requests.get(download_link, headers=headers, stream=True) as r:
              r.raise_for_status()
              with open(file_path, 'wb') as f:
                  for chunk in r.iter_content(chunk_size=8192):
                      f.write(chunk)
          print(f"فایل با موفقیت در {file_path} ذخیره شد.")
          EOF

      - name: آپلود پوشه downloads به عنوان Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Phyre_Engine
          path: downloads/   # کل پوشه آپلود می‌شود
