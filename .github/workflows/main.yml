name: دانلود فایل از MediaFire
on:
  workflow_dispatch: # اجازه اجرای دستی

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: نصب پایتون
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: نصب mediafiredl
        run: pip install mediafiredl

      - name: دانلود فایل
        run: |
          python -c "
          from mediafiredl import MediafileDL
          MediafileDL.Download('http://www.mediafire.com/file/h5m8k0iicb8d4zu/Phyre_Engine.7z')
          "

      - name: آپلود فایل دانلود شده
        uses: actions/upload-artifact@v4
        with:
          name: Phyre_Engine
          path: "*.7z"
